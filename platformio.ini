; Default environment — OTA upload
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_ota.csv
build_flags = -D MQTT_MAX_PACKET_SIZE=1024

; OTA Upload — flash directly via IP
upload_protocol = espota
upload_port = 192.168.1.55
upload_flags = --auth=eup-proxy-ota

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4

; USB Fallback — serial flash via usbipd
[env:usb]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_ota.csv
build_flags = -D MQTT_MAX_PACKET_SIZE=1024
upload_protocol = esptool
upload_port = /dev/ttyACM0
upload_speed = 460800

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4

; Native testing environment on development host PC
[env:native]
platform = native
test_framework = unity
build_flags = -DNATIVE_TEST -std=gnu++17 -Itest/mocks
test_build_src = yes
build_src_filter = +<*> -<main.cpp>
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
